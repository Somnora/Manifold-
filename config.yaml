# Manifold tunables. Secrets do NOT go here — they live in .env.

guardrails:
  # Hard limits enforced BEFORE any launch API call. A launch that would
  # exceed either limit is rejected outright, never queued.
  max_concurrent_instances: 1
  max_hourly_spend_usd: 4.00

launch:
  # Lambda frequently returns insufficient-capacity. One "attempt" tries the
  # requested type plus each fallback type once, in order; between attempts
  # we back off exponentially (base * 2^n, capped at max).
  max_attempts: 5
  backoff_base_seconds: 5
  backoff_max_seconds: 120
  # Ordered fallback instance types tried when the requested type has no
  # capacity, e.g. [gpu_1x_a10, gpu_1x_a100_sxm4]. Each fallback must still
  # pass the budget guard or it is skipped.
  fallback_instance_types: []
  # How long to wait for a launched instance to reach "active" with an IP.
  # SXM4/large multi-GPU boots routinely run 15-30+ min on Lambda's side;
  # 900s cut those off mid-boot. 2400s (40 min) covers the observed worst case.
  boot_timeout_seconds: 2400
  boot_poll_seconds: 10

ssh:
  # Name of the SSH key as registered with Lambda (GET /ssh-keys),
  # and the matching private key on this machine.
  key_name: "lambda-burst-ed25519"
  private_key_path: ~/.ssh/lambda_burst_ed25519
  username: ubuntu
  connect_timeout_seconds: 15
  # Managed-connection reconnect backoff (base * 2^n, capped).
  reconnect_base_seconds: 1
  reconnect_max_seconds: 30
  # Liveness pings on the managed connection: drop and reconnect after
  # ~interval * count_max of silence (~45s), instead of waiting the ~15 min
  # the OS takes to notice a dead TCP path.
  keepalive_interval_seconds: 15
  keepalive_count_max: 3
  # Ceiling on a single remote command (sidecar-less shell calls: diagnose,
  # etc.). A stalled NFS mount can't wedge a request forever. Sync/archive
  # pass their own longer bounds; job dispatch streams unbounded by design.
  command_timeout_seconds: 120

connection:
  # direct-ssh (default) or tailscale. Overridable per launch.
  default_mode: direct-ssh

tasks:
  # How often the dispatcher looks for queued tasks and a connected instance.
  poll_seconds: 1.0
  # First-job GPU preflight. A100 SXM boxes cannot initialize CUDA until
  # nvidia-fabricmanager finishes starting (minutes after boot, while
  # nvidia-smi already looks fine) - a job dispatched in that window dies
  # with "No CUDA GPUs are available" after burning billed minutes. The
  # dispatcher waits (up to the timeout) for the fabric state to settle
  # before the FIRST job on each instance, then dispatches anyway.
  gpu_ready_timeout_seconds: 180
  gpu_ready_poll_seconds: 10

idle:
  # No running job and no terminal activity for this long -> the backend
  # requests termination through the standard flow (safety hook included).
  # The instance card shows the countdown and a per-instance "Keep alive"
  # switch. 300s proved brutal during interactive testing (it terminated
  # an instance mid-session); 30 minutes is the interactive-friendly default.
  timeout_seconds: 1800
  poll_seconds: 15

autopilot:
  # Agent runs: a model (GPU-served, local, or frontier API) drives
  # Manifold's guarded operations. Every launch/terminate still passes the
  # same guards.
  max_steps_default: 20     # steps per run unless the request says otherwise
  max_steps_cap: 50         # hard ceiling no request can exceed
  wait_cap_seconds: 120     # longest single "wait" action the agent may take
  chat_timeout_seconds: 300 # per-turn timeout talking to the brain model
  # Approval-gated runs: how long a paused launch/run_job/terminate waits
  # for your Approve/Deny before auto-denying (the run adapts, not dies).
  approval_timeout_seconds: 600

preferences:
  # DEFAULTS for the three policies you can also change on the Settings page.
  # Changing them there stores your choice in the database and overrides what
  # is written here (a UI must not rewrite a commented YAML file). Editing
  # this file changes the defaults a fresh install starts with.

  approvals:
    # Which autopilot actions pause for your Approve/Deny.
    #
    # This is a MONEY decision, not a caution decision. An approval nobody
    # answers auto-denies after autopilot.approval_timeout_seconds, so gating
    # an action means "if I am away from my desk, this does not happen":
    #
    #   launch_gpu         not launching costs $0.            <- safe to gate
    #   terminate_instance NOT terminating keeps billing.     <- gating this
    #                      loses money exactly when you are away, which is
    #                      when autopilot runs. Leave it off.
    #   run_job            not running leaves a paid GPU idle. Same logic.
    launch_gpu: true
    run_job: false
    terminate_instance: false

  notifications:
    # A paused approval nobody hears about is a stall, not a safeguard.
    approval_requested: true
    job_succeeded: true
    job_failed: true
    run_finished: true       # an autopilot run ended
    data_transferred: true   # files were rescued off an instance
    capacity_available: true # a capacity watch found its GPU
    # Also raise a real OS notification (macOS Notification Center,
    # notify-send on Linux) so it reaches you outside the window. In-app
    # notifications are recorded either way.
    desktop: true

  data_safety:
    # What happens to files on an instance's scratch disk when it is torn
    # down. That disk dies with the instance; the persistent filesystem
    # survives. Termination RESCUES first, then re-checks.
    #
    # WHERE the data goes (both may be on):
    to_filesystem: true    # rsync scratch to the Lambda persistent volume.
                           # Datacenter-local, so effectively free and total.
    to_local: false        # also pull the files down to THIS machine over the
                           # managed SSH connection. Costs real transfer time
                           # while the GPU bills, so it is off by default and
                           # budgeted below.
    local_dir: "~/Manifold/rescued"
    max_local_gib: 25.0    # ceiling on one instance's download. Files that do
                           # not fit are SKIPPED and reported, never silently
                           # dropped.
    # WHAT is worth rescuing:
    #   all      every file the sidecar flags as valuable
    #   outputs  only a job's deliverables (outputs/...), leaving multi-GB
    #            checkpoints and caches behind
    scope: all
    # And the one that actually matters: what if a file could NOT be saved?
    #   block      keep the instance alive with the data intact and ping you.
    #              The GPU keeps billing, but data loss is unrecoverable and a
    #              billing hour is not.
    #   terminate  stop the billing and let those files die. Recorded in the
    #              audit log and the notification, never silent.
    if_unsaveable: block

hub:
  # The local half of Manifold: brains on this machine and frontier APIs.
  # Local model servers probed for brains (appear automatically when up).
  local_endpoints:
    - { name: ollama, base_url: "http://127.0.0.1:11434/v1" }
    - { name: lmstudio, base_url: "http://127.0.0.1:1234/v1" }
  # Frontier APIs usable as brains once their key env var is in .env.
  api_brains:
    - { name: claude, base_url: "https://api.anthropic.com/v1",
        model: claude-sonnet-4-5, api_key_env: ANTHROPIC_API_KEY }
    - { name: openai, base_url: "https://api.openai.com/v1",
        model: gpt-4o, api_key_env: OPENAI_API_KEY }
    - { name: gemini,
        base_url: "https://generativelanguage.googleapis.com/v1beta/openai",
        model: gemini-2.5-pro, api_key_env: GEMINI_API_KEY }
  # Frontier CLIs offered as brains when installed + logged in (their own
  # official OAuth; Manifold never sees a token). Remove a name to hide it.
  cli_brains: [claude, codex, gemini]
  # The in-dashboard terminal on THIS machine (Hub page). Loopback-only and
  # origin-checked; set false to remove the endpoint entirely.
  local_terminal: true
  # A refresh (or frozen tab) no longer kills dock shells: the shell stays
  # alive waiting for the page to reattach. This is how long a DETACHED
  # shell waits before being reaped (a closed tab never comes back).
  terminal_grace_seconds: 900

watches:
  # Capacity watches: poll the instance-types catalog on this interval.
  poll_seconds: 60
  # If false, a watch marked auto_launch only notifies; it never launches.
  auto_launch_enabled: false

telemetry:
  # How often the dispatcher records one GPU telemetry sample per connected
  # instance (peak VRAM, avg util). Backs the post-run utilization verdict
  # and right-size hint on the History page. Advisory only; reads the
  # sidecar over the existing managed connection, never the launch path.
  sample_seconds: 30

auto_manage:
  # How often the auto-manage lifecycle loop advances a queued-then-launch job
  # (launch -> run -> sync -> terminate). Modest by default: while a job waits
  # for a free slot the only API call is the guarded request_launch; every
  # other step is a local DB read.
  poll_seconds: 5

database:
  path: manifold.db
