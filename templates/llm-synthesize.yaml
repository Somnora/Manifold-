# Synthesize a dataset with the model served ON THIS INSTANCE: map an
# instruction over every record of a JSONL/CSV file and write structured
# results back to persistent storage.
#
#   scraped records --> [instruction + record -> served model] --> synthesized.jsonl
#
# Requires a running vllm-serve job on the same instance (the model server
# on the host's loopback — that is why this template uses host networking).
# The model id is auto-discovered from /v1/models. Output: one JSON line
# per record: {"record": <input>, "synthesis": <model output>} under
# <filesystem>/synthesized/. Stdlib-only (urllib), so the container starts
# in seconds.
name: llm-synthesize
description: Map an instruction over a JSONL/CSV dataset using the model served on this instance
image: python:3.11-slim
network: host

# $PYCODE must be expanded by the CONTAINER's shell, not the host: it is
# referenced INSIDE a single-quoted `bash -c` (host leaves it literal), and
# parameters arrive as positional args via "$@" (quoted at the top level,
# so they reach the container intact). A bare `python -c "$PYCODE"` would be
# expanded to empty by the instance shell and run nothing. See DECISIONS.md
# 2026-07-12 (env-script quoting).
command: >
  bash -c 'exec python -c "$PYCODE" "$@"' manifold
  {{input_path}} {{output_name}} {{instruction}} {{port}} {{limit}} {{output_format}}

parameters:
  - name: input_path
    type: string
    description: Input file on the persistent filesystem (relative, .jsonl or .csv)
  - name: instruction
    type: string
    description: What to extract/synthesize from each record (the system prompt)
  - name: output_name
    type: string
    default: synthesized
    description: Output name; results land at <filesystem>/synthesized/<name>.jsonl
  - name: port
    type: integer
    default: 8080
    description: Loopback port of the vllm-serve job on this instance
  - name: limit
    type: integer
    default: 0
    description: Max records to process (0 = all) — use a small number to test
  - name: output_format
    type: string
    default: records
    description: records = {record, synthesis} rows; alpaca = {instruction, input, output} rows that axolotl-finetune trains on directly (distillation)

volumes:
  - host: "{persistent}"
    container: /data

env:
  PYCODE: |
    import csv, json, os, sys, time, urllib.request
    inp, out_name, instruction, port, limit = (
        sys.argv[1], sys.argv[2], sys.argv[3], int(sys.argv[4]), int(sys.argv[5]))
    out_format = sys.argv[6] if len(sys.argv) > 6 else "records"
    if out_format not in ("records", "alpaca"):
        sys.exit(f"output_format must be 'records' or 'alpaca', got {out_format!r}")
    base = f"http://127.0.0.1:{port}/v1"
    # Overridable so tests can fail fast; ops rarely needs to touch it.
    READY_TIMEOUT = int(os.environ.get("MANIFOLD_SYNTH_READY_TIMEOUT", "300"))

    def api(path, payload=None, timeout=600):
        req = urllib.request.Request(
            base + path,
            data=json.dumps(payload).encode() if payload else None,
            headers={"Content-Type": "application/json"})
        with urllib.request.urlopen(req, timeout=timeout) as r:
            return json.load(r)

    # Preflight 1: the input must exist. Fail with a path, not a traceback.
    in_path = "/data/" + inp
    if not os.path.exists(in_path):
        sys.exit(f"input file not found: {in_path} "
                 f"(path is relative to the filesystem root)")

    # Preflight 2: WAIT for the served model to actually answer, instead of
    # crashing if synthesize was queued before vllm-serve finished loading.
    print(f"waiting for a model on 127.0.0.1:{port} "
          f"(up to {READY_TIMEOUT}s) ...", flush=True)
    model = None
    deadline = time.time() + READY_TIMEOUT
    while True:
        try:
            model = api("/models", timeout=10)["data"][0]["id"]
            break
        except Exception as exc:
            if time.time() >= deadline:
                sys.exit(f"no model answered on :{port} within {READY_TIMEOUT}s "
                         f"— is a vllm-serve job running and finished loading? "
                         f"({exc})")
            time.sleep(2)
    print(f"synthesizing with {model}", flush=True)

    def records():
        # Yields (index, record_or_error). Malformed input lines are surfaced
        # as failures, never allowed to kill the whole run.
        if in_path.endswith(".csv"):
            with open(in_path, newline="") as f:
                for i, row in enumerate(csv.DictReader(f), 1):
                    yield i, row, None
        else:
            with open(in_path) as f:
                for i, line in enumerate(f, 1):
                    line = line.strip()
                    if not line:
                        continue
                    try:
                        yield i, json.loads(line), None
                    except json.JSONDecodeError as exc:
                        yield i, None, f"line {i}: {exc}"

    def synthesize(record):
        # Retry transient model errors so a single blip never drops a record.
        last = None
        for attempt in range(3):
            try:
                reply = api("/chat/completions", {
                    "model": model,
                    "temperature": 0.1,
                    "messages": [
                        {"role": "system", "content": instruction},
                        {"role": "user", "content": json.dumps(record)},
                    ],
                })
                return reply["choices"][0]["message"]["content"]
            except Exception as exc:
                last = exc
                time.sleep(1 + attempt)
        raise last

    def as_points(content):
        # Turn the model's reply into usable structured points when it is
        # JSON — including the ```json fenced form models love to emit.
        s = content.strip()
        if s.startswith("```"):
            s = s[3:]
            if s[:4].lower() == "json":
                s = s[4:]
            if s.endswith("```"):
                s = s[:-3]
            s = s.strip()
        try:
            return json.loads(s)
        except Exception:
            return None

    out_path = f"/data/synthesized/{out_name}.jsonl"
    os.makedirs("/data/synthesized", exist_ok=True)
    done = failed = 0
    with open(out_path, "w") as out:
        for i, record, parse_error in records():
            if limit and done + failed >= limit:
                break
            if parse_error:
                failed += 1
                print(f"skipped malformed input {parse_error}", flush=True)
                continue
            try:
                content = synthesize(record)
                if out_format == "alpaca":
                    # Distillation rows: exactly what axolotl's `type: alpaca`
                    # trains on. instruction = the task, input = the raw
                    # record, output = the teacher's reply.
                    row = {"instruction": instruction,
                           "input": json.dumps(record, ensure_ascii=False),
                           "output": content}
                else:
                    row = {"record": record, "synthesis": content}
                    points = as_points(content)
                    if points is not None:
                        row["synthesis_json"] = points   # ready-to-use points
                    else:
                        row["parse_error"] = True         # model did not emit JSON
                out.write(json.dumps(row) + "\n")
                out.flush()
                done += 1
            except Exception as exc:
                failed += 1
                print(f"record {i} failed after retries: {exc}", flush=True)
            if (done + failed) % 25 == 0:
                print(f"progress: {done} ok, {failed} failed", flush=True)
    print(f"finished: {done} synthesized, {failed} failed -> {out_path}",
          flush=True)

gpu:
  min_vram_gib: 0
