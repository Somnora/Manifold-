# Serve a model with vLLM's OpenAI-compatible server.
# The port is bound to 127.0.0.1 on the instance by the dispatcher; reach it
# from your machine through the backend's SSH port forward.
name: vllm-serve
description: Serve a model with vLLM (OpenAI-compatible API on a loopback port). Use a standard HF Transformers repo (e.g. Qwen/Qwen2.5-7B-Instruct); GGUF quant repos will not load.
image: vllm/vllm-openai:latest

# The image ENTRYPOINT is `vllm serve` (verified from the image config), so
# the model is a POSITIONAL argument here, not `--model`. Passing `--model`
# is what made this exit immediately after a successful pull.
# Tool calling is on by default: agent frameworks (pydantic-ai, OpenAI SDK
# tool use) get structured output via tool calls, and without these flags
# vLLM answers those requests with 400s. The parser must match the model's
# tool-call format: hermes fits Qwen/Hermes-style models (our presets);
# use mistral or llama3_json for those families.
command: >
  {{model_id}}
  --max-model-len {{max_context}}
  --port {{port}}
  --tensor-parallel-size {{tensor_parallel}}
  --enable-auto-tool-choice
  --tool-call-parser {{tool_call_parser}}

parameters:
  - name: model_id
    type: string
    description: HuggingFace model id to serve (e.g. Qwen/Qwen3-8B), or a local path like /data/models/merged for a model produced by lora-merge
  - name: max_context
    type: integer
    default: 8192
    description: Maximum context length in tokens
  - name: port
    type: integer
    default: 8080
    description: Container port for the API server (loopback-only on the host)
  - name: tensor_parallel
    type: integer
    default: 1
    description: Shard the model across this many GPUs (set to 8 on an 8x cluster for big MoE models)
  - name: tool_call_parser
    type: string
    default: hermes
    description: Tool-call format parser, needed for structured output / agent frameworks. hermes fits Qwen and Hermes models; use mistral or llama3_json for those families.

volumes:
  # HuggingFace cache on persistent storage: models survive the instance.
  - host: "{persistent}/cache/huggingface"
    container: /root/.cache/huggingface
  # Locally-produced HF models (e.g. from lora-merge) live here; serve one by
  # path with model_id=/data/models/<name>. Read-only: serving never writes.
  - host: "{persistent}/models"
    container: /data/models
    read_only: true

ports:
  - host: 8080
    container: 8080

env:
  VLLM_NO_USAGE_STATS: "1"

gpu:
  min_vram_gib: 24
  recommended_types:
    - gpu_1x_a10
    - gpu_1x_h100_pcie
    - gpu_1x_h100_sxm5
